<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0612"/>
      <stop offset="50%" stop-color="#16102b"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>

    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Soft glows -->
  <circle cx="280" cy="180" r="320" fill="url(#glow-purple)"/>
  <circle cx="920" cy="220" r="320" fill="url(#glow-pink)"/>
  <circle cx="600" cy="380" r="260" fill="url(#glow-blue)"/>
  <circle cx="100" cy="350" r="200" fill="url(#glow-teal)"/>

  <!-- Background streams -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700">
    <text x="600" y="55" font-size="34" fill="#ffffff" opacity="0.05" text-anchor="middle" letter-spacing="3">AURORA · AURORA · AURORA · AURORA · AURORA · AURORA · AURORA</text>
    <text x="600" y="375" font-size="30" fill="#ffffff" opacity="0.06" text-anchor="middle" letter-spacing="3">AURORA · AURORA · AURORA · AURORA · AURORA · AURORA</text>
  </g>

  <!-- Star + glow above title -->
  <g transform="translate(600 130)">
    <circle r="50" fill="url(#star-glow)"/>
    <text font-size="64" fill="url(#aurora)" text-anchor="middle" dominant-baseline="central" font-family="serif">✦</text>
  </g>

  <!-- Main title -->
  <text x="600" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="800" fill="url(#aurora)" text-anchor="middle" letter-spacing="-3">AURORA</text>

  <!-- Subtitle -->
  <text x="600" y="290" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#ededf5" opacity="0.55" text-anchor="middle" letter-spacing="8">CRAFTED · WITH · CLAUDE</text>

  <!-- Accent line -->
  <line x1="540" y1="315" x2="660" y2="315" stroke="url(#aurora)" stroke-width="1.5" opacity="0.7"/>

  <!-- Decorative dots -->
  <circle cx="540" cy="315" r="3" fill="#a78bfa"/>
  <circle cx="660" cy="315" r="3" fill="#60a5fa"/>
</svg>
